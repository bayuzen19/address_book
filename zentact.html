<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Charm Address Book</title>
  <!-- Bootstrap 5 & Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="./images/logo.png" alt="Charm Logo"/>
        <span>Charm</span>
      </div>
      <nav class="nav-labels">
        <ul>
          <li><a href="#" class="filter-link active" data-label="All">All Contacts</a></li>
          <li><a href="#" class="filter-link" data-label="Family">Family</a></li>
          <li><a href="#" class="filter-link" data-label="Friend">Friend</a></li>
          <li><a href="#" class="filter-link" data-label="Customer">Customer</a></li>
          <li><a href="#" class="filter-link" data-label="Work">Work</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Content Area -->
    <div class="content-area">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <h1>Charm</h1>
          <div class="search-wrapper">
            <i class="bi bi-search"></i>
            <input id="search" type="text" placeholder="Search…" />
          </div>
        </div>
        <div class="topbar-right">
          <button id="add" class="btn btn-light btn-add">+ Add Contact</button>
          <div class="user-info">
            <img src="./images/bayuzen.jpg" alt="User"/>
            <div class="user-text">
              <div class="username">Bayuzen Ahmad</div>
              <div class="user-role">AI Engineer</div>
            </div>
          </div>
        </div>
      </header>

      <!-- Main Content / Table -->
      <main class="main-content">
        <div class="table-responsive h-100">
          <table class="table contacts-table mb-0">
            <thead>
              <tr>
                <th>Photo</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Label</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="contacts-body"></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
